<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#030305"/>
    </radialGradient>
    
    <!-- Subtle Vignette / Shadow -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Scanline Pattern -->
    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.007"/>
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&amp;family=Outfit:wght@800&amp;display=swap');
    
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    .font-sans {
      font-family: 'Outfit', sans-serif;
    }

    /* Animations */
    @keyframes blink {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.85; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes float-dust-1 {
      0% { transform: translate(0, 0); opacity: 0.1; }
      50% { transform: translate(15px, -20px); opacity: 0.4; }
      100% { transform: translate(30px, 0); opacity: 0.1; }
    }
    @keyframes float-dust-2 {
      0% { transform: translate(0, 0); opacity: 0.2; }
      50% { transform: translate(-20px, -35px); opacity: 0.6; }
      100% { transform: translate(-40px, 0); opacity: 0.2; }
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.9; }
    }

    .sh-blink {
      animation: blink 2.5s infinite ease-in-out;
    }
    .cursor {
      animation: cursor-blink 1s infinite steps(1);
    }
    .dust-1 {
      animation: float-dust-1 12s infinite ease-in-out;
    }
    .dust-2 {
      animation: float-dust-2 18s infinite ease-in-out;
    }
    .pulse {
      animation: pulse-text 4s infinite ease-in-out;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Ambient Dust Particles -->
  <circle cx="150" cy="180" r="1.5" fill="#a1a1aa" class="dust-1"/>
  <circle cx="280" cy="120" r="1" fill="#71717a" class="dust-2"/>
  <circle cx="450" cy="250" r="2" fill="#a1a1aa" class="dust-1" style="animation-delay: -3s;"/>
  <circle cx="620" cy="150" r="1.2" fill="#71717a" class="dust-2" style="animation-delay: -5s;"/>
  <circle cx="530" cy="290" r="1.5" fill="#a1a1aa" class="dust-1" style="animation-delay: -7s;"/>
  <circle cx="210" cy="310" r="1" fill="#71717a" class="dust-2" style="animation-delay: -9s;"/>

  <!-- Grid / Scanlines -->
  <rect width="100%" height="100%" fill="url(#scanlines)"/>
  
  <!-- Vignette -->
  <rect width="100%" height="100%" fill="url(#vignette)"/>

  <!-- Window Frame / Outer Border -->
  <rect x="20" y="20" width="760" height="360" rx="8" fill="none" stroke="#27272a" stroke-width="1.5" opacity="0.6"/>

  <!-- Window Header Title Bar -->
  <line x1="20" y1="55" x2="780" y2="55" stroke="#27272a" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Window Controls (Gray dots) -->
  <circle cx="45" cy="38" r="6" fill="#27272a"/>
  <circle cx="65" cy="38" r="6" fill="#27272a"/>
  <circle cx="85" cy="38" r="6" fill="#27272a"/>

  <!-- Window Title -->
  <text x="400" y="42" fill="#71717a" font-size="11" font-weight="700" letter-spacing="0.15em" text-anchor="middle" class="font-mono">VARSHUOS // SYSTEM.LOG</text>

  <!-- Console Terminal Code Text -->
  <text x="60" y="100" fill="#3f3f46" font-size="12" class="font-mono">system_boot --silent --desaturated</text>
  <text x="60" y="125" fill="#3f3f46" font-size="12" class="font-mono">loading offline kernel modules...</text>
  <text x="60" y="150" fill="#3f3f46" font-size="12" class="font-mono">done.</text>

  <!-- Giant Status Box -->
  <rect x="60" y="180" width="680" height="110" rx="6" fill="#09090b" stroke="#1f1f23" stroke-width="1.5"/>
  
  <!-- Text inside status box -->
  <text x="90" y="225" fill="#a1a1aa" font-size="14" font-weight="700" letter-spacing="0.1em" class="font-mono">SYSTEM STATUS: <tspan fill="#7f1d1d" class="sh-blink">● OFFLINE</tspan></text>
  <text x="90" y="255" fill="#71717a" font-size="13" font-weight="400" letter-spacing="0.05em" class="font-mono">RETURN TARGET: <tspan fill="#3f3f46">02.05.2027</tspan></text>
  
  <!-- Blinking Cursor -->
  <rect x="290" y="244" width="8" height="15" fill="#3f3f46" class="cursor"/>

  <!-- Subtext / Poem Quote -->
  <text x="400" y="335" fill="#52525b" font-size="12" font-style="italic" text-anchor="middle" class="font-mono">"some chapters are written in silence."</text>
</svg>
