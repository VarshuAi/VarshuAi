<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020108"/>
      <stop offset="30%" stop-color="#0A0520"/>
      <stop offset="60%" stop-color="#10082E"/>
      <stop offset="100%" stop-color="#050215"/>
    </linearGradient>

    <radialGradient id="orbGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF007F" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF007F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BD93F9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#BD93F9" stop-opacity="0"/>
    </radialGradient>

    <filter id="neonCyan">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="12" result="b2"/>
      <feGaussianBlur stdDeviation="24" result="b3"/>
      <feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonPink">
      <feGaussianBlur stdDeviation="4" result="b1"/>
      <feGaussianBlur stdDeviation="12" result="b2"/>
      <feGaussianBlur stdDeviation="24" result="b3"/>
      <feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Rajdhani:wght@500;700&amp;family=Share+Tech+Mono&amp;display=swap');

      /* === FLOATING ORB ANIMATIONS === */
      @keyframes floatOrb1 {
        0%,100% { transform: translate(0,0) scale(1); }
        25% { transform: translate(30px,-20px) scale(1.1); }
        50% { transform: translate(-10px,-40px) scale(0.9); }
        75% { transform: translate(-30px,-10px) scale(1.05); }
      }
      @keyframes floatOrb2 {
        0%,100% { transform: translate(0,0) scale(1); }
        33% { transform: translate(-40px,25px) scale(1.15); }
        66% { transform: translate(20px,-30px) scale(0.85); }
      }
      @keyframes floatOrb3 {
        0%,100% { transform: translate(0,0); }
        50% { transform: translate(50px,30px); }
      }
      .orb1 { animation: floatOrb1 12s ease-in-out infinite; }
      .orb2 { animation: floatOrb2 15s ease-in-out infinite; }
      .orb3 { animation: floatOrb3 18s ease-in-out infinite; }

      /* === SCAN LINE === */
      @keyframes scanLine {
        0% { transform: translateY(-10px); opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { transform: translateY(410px); opacity: 0; }
      }
      .scan-line { animation: scanLine 6s linear infinite; }

      /* === GRID SCROLL === */
      @keyframes gridScroll {
        0% { transform: translateY(0); }
        100% { transform: translateY(50px); }
      }
      .grid-anim { animation: gridScroll 3s linear infinite; }

      /* === MATRIX RAIN === */
      @keyframes matrixDrop {
        0% { transform: translateY(-80px); opacity: 0; }
        10% { opacity: 0.7; }
        90% { opacity: 0.7; }
        100% { transform: translateY(420px); opacity: 0; }
      }

      /* === RING ROTATION === */
      @keyframes spinCW { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }
      @keyframes spinCCW { 0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)} }

      /* === PULSE === */
      @keyframes pulse {
        0%,100% { opacity: 0.4; r: 3; }
        50% { opacity: 1; r: 5; }
      }
      @keyframes pulseSlow {
        0%,100% { opacity: 0.15; }
        50% { opacity: 0.45; }
      }

      /* === TITLE GLITCH === */
      @keyframes glitch1 {
        0%,92%,100% { transform: translate(0); }
        93% { transform: translate(-4px,2px) skewX(-8deg); }
        95% { transform: translate(3px,-1px) skewX(5deg); }
        97% { transform: translate(-2px,-2px); }
      }
      @keyframes glitch2 {
        0%,90%,100% { clip-path: inset(0 0 0 0); opacity:0; }
        91% { clip-path: inset(20% 0 60% 0); opacity:0.8; transform: translate(-3px,0); }
        93% { clip-path: inset(60% 0 10% 0); opacity:0.8; transform: translate(3px,0); }
        95% { clip-path: inset(30% 0 40% 0); opacity:0.6; transform: translate(-2px,0); }
      }

      /* === TYPING CURSOR === */
      @keyframes blink { 0%,49%{opacity:1}50%,100%{opacity:0} }
      @keyframes typeReveal {
        0%,8% { width: 0; }
        40%,60% { width: 440px; }
        92%,100% { width: 0; }
      }

      /* === HEX GRID PULSE === */
      @keyframes hexPulse {
        0%,100% { stroke-opacity: 0.03; }
        50% { stroke-opacity: 0.12; }
      }

      /* === WAVEFORM === */
      @keyframes waveShift {
        0% { transform: translateX(0); }
        100% { transform: translateX(-200px); }
      }
      .wave-move { animation: waveShift 4s linear infinite; }

      /* === PARTICLE DRIFT === */
      @keyframes drift1 { 0%,100%{transform:translate(0,0);opacity:0.2}25%{transform:translate(15px,-25px);opacity:0.9}50%{transform:translate(-10px,-45px);opacity:0.5}75%{transform:translate(20px,-15px);opacity:0.7} }
      @keyframes drift2 { 0%,100%{transform:translate(0,0);opacity:0.3}50%{transform:translate(-20px,20px);opacity:0.8} }
      @keyframes drift3 { 0%,100%{transform:translate(0,0);opacity:0.1}33%{transform:translate(25px,10px);opacity:0.6}66%{transform:translate(-15px,-20px);opacity:0.9} }

      /* === DATA STREAM BARS === */
      @keyframes dataBar {
        0% { width: 0; }
        50% { width: var(--bar-w); }
        100% { width: 0; }
      }
    </style>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Floating Ambient Orbs -->
  <g filter="url(#softGlow)">
    <circle class="orb1" cx="120" cy="100" r="120" fill="url(#orbGlow1)"/>
    <circle class="orb2" cx="680" cy="300" r="100" fill="url(#orbGlow2)"/>
    <circle class="orb3" cx="400" cy="50" r="80" fill="url(#orbGlow3)"/>
  </g>

  <!-- Perspective Grid -->
  <g opacity="0.08" class="grid-anim">
    <g stroke="#00F5FF" stroke-width="0.5">
      <line x1="0" y1="0" x2="800" y2="0"/><line x1="0" y1="50" x2="800" y2="50"/>
      <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="150" x2="800" y2="150"/>
      <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="250" x2="800" y2="250"/>
      <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="350" x2="800" y2="350"/>
      <line x1="0" y1="400" x2="800" y2="400"/><line x1="0" y1="450" x2="800" y2="450"/>
    </g>
  </g>

  <!-- Hex Grid Pattern (Pulsing) -->
  <g opacity="0.06">
    <g stroke="#BD93F9" stroke-width="0.8" fill="none" style="animation: hexPulse 5s ease-in-out infinite">
      <polygon points="60,30 90,15 120,30 120,60 90,75 60,60"/>
      <polygon points="120,30 150,15 180,30 180,60 150,75 120,60"/>
      <polygon points="180,30 210,15 240,30 240,60 210,75 180,60"/>
      <polygon points="90,75 120,60 150,75 150,105 120,120 90,105"/>
      <polygon points="150,75 180,60 210,75 210,105 180,120 150,105"/>
      <polygon points="600,250 630,235 660,250 660,280 630,295 600,280"/>
      <polygon points="660,250 690,235 720,250 720,280 690,295 660,280"/>
      <polygon points="630,295 660,280 690,295 690,325 660,340 630,325"/>
    </g>
  </g>

  <!-- Scan Line -->
  <rect class="scan-line" x="0" y="-10" width="800" height="2" fill="#00F5FF" opacity="0.15"/>

  <!-- Matrix Code Rain Columns -->
  <g font-family="Share Tech Mono, monospace" font-size="11" fill="#00F5FF" opacity="0.12">
    <text x="42" y="0" style="animation: matrixDrop 5s linear infinite 0.5s">01001011</text>
    <text x="140" y="0" style="animation: matrixDrop 4s linear infinite 1.2s">11010010</text>
    <text x="720" y="0" style="animation: matrixDrop 6s linear infinite 0.8s">10110101</text>
    <text x="580" y="0" style="animation: matrixDrop 4.5s linear infinite 2s">01110011</text>
    <text x="340" y="0" style="animation: matrixDrop 5.5s linear infinite 3s">11001010</text>
  </g>

  <!-- Floating Drift Particles -->
  <circle cx="100" cy="300" r="2" fill="#00F5FF" style="animation: drift1 7s ease-in-out infinite"/>
  <circle cx="250" cy="80" r="1.5" fill="#FF007F" style="animation: drift2 9s ease-in-out infinite 1s"/>
  <circle cx="500" cy="350" r="2.5" fill="#BD93F9" style="animation: drift3 11s ease-in-out infinite 2s"/>
  <circle cx="700" cy="60" r="1.8" fill="#00F5FF" style="animation: drift1 8s ease-in-out infinite 3s"/>
  <circle cx="380" cy="370" r="2" fill="#FF007F" style="animation: drift2 10s ease-in-out infinite 4s"/>
  <circle cx="650" cy="180" r="1.5" fill="#39FF14" style="animation: drift3 12s ease-in-out infinite"/>
  <circle cx="50" cy="180" r="3" fill="#BD93F9" style="animation: drift1 6s ease-in-out infinite 2s"/>

  <!-- ========== HUD ROTATING RINGS (Right Side) ========== -->
  <g>
    <g style="transform-origin:660px 200px; animation: spinCW 30s linear infinite">
      <circle cx="660" cy="200" r="110" fill="none" stroke="#00F5FF" stroke-width="0.8" stroke-dasharray="8 40 20 60 5 30" opacity="0.25"/>
    </g>
    <g style="transform-origin:660px 200px; animation: spinCCW 22s linear infinite">
      <circle cx="660" cy="200" r="95" fill="none" stroke="#FF007F" stroke-width="1" stroke-dasharray="50 15 30 25" opacity="0.3"/>
    </g>
    <g style="transform-origin:660px 200px; animation: spinCW 15s linear infinite">
      <circle cx="660" cy="200" r="78" fill="none" stroke="#BD93F9" stroke-width="1.2" stroke-dasharray="5 5 15 5 25 10" opacity="0.35"/>
    </g>
    <g style="transform-origin:660px 200px; animation: spinCCW 10s linear infinite">
      <circle cx="660" cy="200" r="58" fill="none" stroke="#00F5FF" stroke-width="1.5" stroke-dasharray="3 8 12 8" opacity="0.4"/>
    </g>
    <!-- Core Glow -->
    <circle cx="660" cy="200" r="35" fill="#080418" stroke="#FF007F" stroke-width="1.5" filter="url(#neonPink)" opacity="0.8"/>
    <circle cx="660" cy="200" r="18" fill="none" stroke="#00F5FF" stroke-width="2" filter="url(#neonCyan)" opacity="0.9"/>
    <!-- Crosshairs -->
    <line x1="640" y1="200" x2="632" y2="200" stroke="#00F5FF" stroke-width="1" opacity="0.6"/>
    <line x1="680" y1="200" x2="688" y2="200" stroke="#00F5FF" stroke-width="1" opacity="0.6"/>
    <line x1="660" y1="180" x2="660" y2="172" stroke="#00F5FF" stroke-width="1" opacity="0.6"/>
    <line x1="660" y1="220" x2="660" y2="228" stroke="#00F5FF" stroke-width="1" opacity="0.6"/>
    <!-- Core Pulse -->
    <circle cx="660" cy="200" r="3" fill="#00F5FF" style="animation: pulse 2s ease-in-out infinite"/>
  </g>

  <!-- ========== MAIN CONTENT ========== -->
  <g transform="translate(60, 0)">

    <!-- Top Badge -->
    <g transform="translate(0, 50)">
      <line x1="0" y1="0" x2="14" y2="0" stroke="#FF007F" stroke-width="2"/>
      <line x1="14" y1="0" x2="22" y2="8" stroke="#FF007F" stroke-width="2"/>
      <line x1="22" y1="8" x2="200" y2="8" stroke="#FF007F" stroke-width="1" opacity="0.5"/>
      <text x="28" y="5" font-family="Share Tech Mono, monospace" fill="#FF007F" font-size="10" letter-spacing="4" opacity="0.9">SYSTEM ARCHITECT // DEVSECOPS</text>
    </g>

    <!-- ========== TITLE: VarshuAi ========== -->
    <g transform="translate(0, 120)">
      <!-- Deep shadow layer -->
      <text font-family="Orbitron, sans-serif" font-weight="900" font-size="72" letter-spacing="6" fill="#0A0520" x="4" y="4">VarshuAi</text>
      <!-- Magenta glow layer -->
      <text font-family="Orbitron, sans-serif" font-weight="900" font-size="72" letter-spacing="6" fill="#FF007F" filter="url(#neonPink)" opacity="0.6" style="animation: glitch1 5s infinite" x="0" y="0">VarshuAi</text>
      <!-- Cyan glow layer -->
      <text font-family="Orbitron, sans-serif" font-weight="900" font-size="72" letter-spacing="6" fill="#00F5FF" filter="url(#neonCyan)" opacity="0.7" style="animation: glitch1 5s infinite 0.1s" x="-2" y="-2">VarshuAi</text>
      <!-- Glitch clone slice -->
      <text font-family="Orbitron, sans-serif" font-weight="900" font-size="72" letter-spacing="6" fill="#FF007F" style="animation: glitch2 4s infinite" x="3" y="0">VarshuAi</text>
      <!-- Crisp white foreground -->
      <text font-family="Orbitron, sans-serif" font-weight="900" font-size="72" letter-spacing="6" fill="#FFFFFF" style="animation: glitch1 5s infinite 0.05s" x="0" y="0">VarshuAi</text>
    </g>

    <!-- Subtitle with Typing Effect -->
    <g transform="translate(0, 170)">
      <text font-family="Share Tech Mono, monospace" font-size="15" fill="#3A3A5C" letter-spacing="2" x="0" y="0">&gt; Full-Stack Engineer | Security Researcher | Open Source</text>
      <clipPath id="typeClip">
        <rect x="0" y="-18" height="28" style="animation: typeReveal 10s steps(40, end) infinite">
          <animate attributeName="width" values="0;440;440;0" keyTimes="0;0.4;0.6;1" dur="10s" repeatCount="indefinite"/>
        </rect>
      </clipPath>
      <text clip-path="url(#typeClip)" font-family="Share Tech Mono, monospace" font-size="15" fill="#00F5FF" letter-spacing="2" filter="url(#neonCyan)" x="0" y="0">&gt; Full-Stack Engineer | Security Researcher | Open Source</text>
      <!-- Blinking cursor -->
      <rect x="440" y="-14" width="2" height="18" fill="#00F5FF" style="animation: blink 1s step-end infinite"/>
    </g>

    <!-- ========== WAVEFORM BAR ========== -->
    <g transform="translate(0, 210)" opacity="0.35">
      <clipPath id="waveClip"><rect x="0" y="-10" width="450" height="20"/></clipPath>
      <g clip-path="url(#waveClip)" class="wave-move">
        <path d="M0,0 Q25,-8 50,0 T100,0 T150,0 T200,0 T250,0 T300,0 T350,0 T400,0 T450,0 T500,0 T550,0 T600,0 T650,0" fill="none" stroke="#00F5FF" stroke-width="1.5"/>
        <path d="M0,0 Q25,6 50,0 T100,0 T150,0 T200,0 T250,0 T300,0 T350,0 T400,0 T450,0 T500,0 T550,0 T600,0 T650,0" fill="none" stroke="#FF007F" stroke-width="1"/>
      </g>
    </g>

    <!-- ========== STATUS DASHBOARD ========== -->
    <g transform="translate(0, 245)">
      <!-- Box 1: Status -->
      <rect x="0" y="0" width="115" height="28" rx="5" fill="rgba(0,245,255,0.04)" stroke="rgba(0,245,255,0.2)" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#39FF14" style="animation: pulse 2.5s ease-in-out infinite"/>
      <text x="26" y="18" font-family="Share Tech Mono, monospace" font-size="11" fill="#00F5FF" letter-spacing="1">SYS: ONLINE</text>

      <!-- Box 2: Repos -->
      <rect x="125" y="0" width="120" height="28" rx="5" fill="rgba(255,0,127,0.04)" stroke="rgba(255,0,127,0.2)" stroke-width="1"/>
      <circle cx="139" cy="14" r="4" fill="#FF007F" style="animation: pulse 3s ease-in-out infinite 1s"/>
      <text x="151" y="18" font-family="Share Tech Mono, monospace" font-size="11" fill="#FF007F" letter-spacing="1">REPOS: 650+</text>

      <!-- Box 3: Stack -->
      <rect x="255" y="0" width="130" height="28" rx="5" fill="rgba(189,147,249,0.04)" stroke="rgba(189,147,249,0.2)" stroke-width="1"/>
      <circle cx="269" cy="14" r="4" fill="#BD93F9" style="animation: pulse 3.5s ease-in-out infinite 2s"/>
      <text x="281" y="18" font-family="Share Tech Mono, monospace" font-size="11" fill="#BD93F9" letter-spacing="1">STACK: 7 LANGS</text>
    </g>

    <!-- ========== BOTTOM DATA STREAM ========== -->
    <g transform="translate(0, 310)">
      <text font-family="Share Tech Mono, monospace" font-size="9" fill="#2A2A4A" letter-spacing="2">SECURITY</text>
      <rect x="65" y="-8" rx="2" height="6" fill="#FF007F" opacity="0.5" width="0">
        <animate attributeName="width" values="0;80;0" dur="4s" repeatCount="indefinite"/>
      </rect>

      <text x="160" font-family="Share Tech Mono, monospace" font-size="9" fill="#2A2A4A" letter-spacing="2">SYSTEMS</text>
      <rect x="220" y="-8" rx="2" height="6" fill="#00F5FF" opacity="0.5" width="0">
        <animate attributeName="width" values="0;60;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
      </rect>

      <text x="300" font-family="Share Tech Mono, monospace" font-size="9" fill="#2A2A4A" letter-spacing="2">AUTOMATION</text>
      <rect x="380" y="-8" rx="2" height="6" fill="#BD93F9" opacity="0.5" width="0">
        <animate attributeName="width" values="0;70;0" dur="5s" repeatCount="indefinite" begin="1s"/>
      </rect>
    </g>
  </g>

  <!-- ========== CORNER BRACKETS ========== -->
  <path d="M12,8 L35,8 M12,8 L12,32" fill="none" stroke="#00F5FF" stroke-width="2" opacity="0.7"/>
  <path d="M788,8 L765,8 M788,8 L788,32" fill="none" stroke="#FF007F" stroke-width="2" opacity="0.7"/>
  <path d="M12,392 L35,392 M12,392 L12,368" fill="none" stroke="#FF007F" stroke-width="2" opacity="0.7"/>
  <path d="M788,392 L765,392 M788,392 L788,368" fill="none" stroke="#00F5FF" stroke-width="2" opacity="0.7"/>

  <!-- Bottom accent -->
  <line x1="60" y1="385" x2="740" y2="385" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="400" cy="385" r="2" fill="#BD93F9" style="animation: pulse 3s ease-in-out infinite"/>
</svg>
