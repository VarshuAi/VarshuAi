<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050C" />
      <stop offset="50%" stop-color="#0B0916" />
      <stop offset="100%" stop-color="#140D26" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="magentaGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animations -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');

      .font-header {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
      }

      .font-mono {
        font-family: 'Share Tech Mono', monospace;
      }

      /* Grid Drawing Animation */
      @keyframes gridMove {
        0% { transform: translateY(0); }
        100% { transform: translateY(40px); }
      }

      .grid-lines {
        animation: gridMove 2.5s linear infinite;
      }

      /* Glowing / Pulsating Animation */
      @keyframes pulseCyan {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(0, 245, 255, 0.6)) drop-shadow(0 0 15px rgba(0, 245, 255, 0.3)); }
        50% { filter: drop-shadow(0 0 15px rgba(0, 245, 255, 0.9)) drop-shadow(0 0 30px rgba(0, 245, 255, 0.5)); }
      }

      @keyframes pulseMagenta {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 0, 127, 0.6)) drop-shadow(0 0 15px rgba(255, 0, 127, 0.3)); }
        50% { filter: drop-shadow(0 0 15px rgba(255, 0, 127, 0.9)) drop-shadow(0 0 30px rgba(255, 0, 127, 0.5)); }
      }

      .glow-cyan {
        animation: pulseCyan 3s ease-in-out infinite;
      }

      .glow-magenta {
        animation: pulseMagenta 3s ease-in-out infinite;
        animation-delay: 1.5s;
      }

      /* Matrix Code Rain Simulation */
      @keyframes rain {
        0% { stroke-dashoffset: 500; opacity: 0; }
        30% { opacity: 0.8; }
        80% { opacity: 0.8; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }

      .rain-line {
        stroke-dasharray: 80 220;
        animation: rain 4s linear infinite;
      }

      /* Glitch Effect on Header Text */
      @keyframes glitch {
        0%, 95%, 100% { transform: translate(0); }
        96% { transform: translate(-3px, 2px); skewX(-5deg); }
        97% { transform: translate(2px, -2px); skewX(5deg); }
        98% { transform: translate(-1px, -1px); }
        99% { transform: translate(3px, 1px); skewX(-3deg); }
      }

      .glitch-text {
        animation: glitch 4s infinite;
      }

      /* Typing Effect Simulation */
      @keyframes typing {
        0%, 100% { width: 0; }
        45%, 55% { width: 380px; }
      }

      .typing-mask {
        animation: typing 8s steps(35, end) infinite;
      }

      /* Floating Cyber Ring */
      @keyframes rotateRing {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .rotating-ring {
        transform-origin: 660px 175px;
        animation: rotateRing 20s linear infinite;
      }

      @keyframes floatParticle {
        0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
        50% { transform: translateY(-20px) translateX(10px); opacity: 0.8; }
      }

      .particle-1 { animation: floatParticle 6s ease-in-out infinite; }
      .particle-2 { animation: floatParticle 8s ease-in-out infinite 2s; }
      .particle-3 { animation: floatParticle 7s ease-in-out infinite 4s; }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="350" fill="url(#bgGrad)" />

  <!-- Cybernetic Grid Perspective Panel -->
  <g opacity="0.15">
    <rect width="800" height="350" fill="none" />
    <g class="grid-lines" stroke="#00F5FF" stroke-width="1">
      <!-- Horizontal lines -->
      <line x1="0" y1="50" x2="800" y2="50" />
      <line x1="0" y1="90" x2="800" y2="90" />
      <line x1="0" y1="130" x2="800" y2="130" />
      <line x1="0" y1="170" x2="800" y2="170" />
      <line x1="0" y1="210" x2="800" y2="210" />
      <line x1="0" y1="250" x2="800" y2="250" />
      <line x1="0" y1="290" x2="800" y2="290" />
      <line x1="0" y1="330" x2="800" y2="330" />
    </g>
    <!-- Perspective lines radiating outwards -->
    <g stroke="#00F5FF" stroke-width="1.5">
      <line x1="400" y1="-100" x2="-200" y2="350" />
      <line x1="400" y1="-100" x2="0" y2="350" />
      <line x1="400" y1="-100" x2="200" y2="350" />
      <line x1="400" y1="-100" x2="400" y2="350" />
      <line x1="400" y1="-100" x2="600" y2="350" />
      <line x1="400" y1="-100" x2="800" y2="350" />
      <line x1="400" y1="-100" x2="1000" y2="350" />
    </g>
  </g>

  <!-- Glowing Matrix Code Rain Streams (Right Side Background) -->
  <g stroke="#FF007F" stroke-width="1.5" opacity="0.3" fill="none">
    <path class="rain-line" d="M 500,0 L 500,350" style="animation-delay: 0.5s; animation-duration: 5s;" />
    <path class="rain-line" d="M 580,-50 L 580,300" style="animation-delay: 1.2s; animation-duration: 3.5s;" />
    <path class="rain-line" d="M 640,-100 L 640,250" style="animation-delay: 0.2s; animation-duration: 4.5s;" />
    <path class="rain-line" d="M 720,50 L 720,400" style="animation-delay: 2.1s; animation-duration: 6s;" />
    <path class="rain-line" d="M 780,-80 L 780,270" style="animation-delay: 1.8s; animation-duration: 4s;" />
  </g>

  <!-- Glowing Matrix Code Rain Streams (Left Side Background) -->
  <g stroke="#00F5FF" stroke-width="1.5" opacity="0.3" fill="none">
    <path class="rain-line" d="M 50,20 L 50,370" style="animation-delay: 0s; animation-duration: 4s;" />
    <path class="rain-line" d="M 120,-30 L 120,320" style="animation-delay: 1.5s; animation-duration: 5.5s;" />
    <path class="rain-line" d="M 220,-80 L 220,270" style="animation-delay: 0.8s; animation-duration: 3.8s;" />
  </g>

  <!-- Floating Digital Dust Particles -->
  <circle class="particle-1" cx="200" cy="80" r="2.5" fill="#00F5FF" />
  <circle class="particle-2" cx="300" cy="280" r="1.5" fill="#FF007F" />
  <circle class="particle-3" cx="550" cy="90" r="2" fill="#00F5FF" />
  <circle class="particle-1" cx="700" cy="260" r="3" fill="#FF007F" />
  <circle class="particle-2" cx="100" cy="220" r="2" fill="#00F5FF" />

  <!-- Cybernetic HUD Gear Ring (Right Side Focus) -->
  <g opacity="0.6">
    <circle class="rotating-ring" cx="660" cy="175" r="90" fill="none" stroke="#00F5FF" stroke-width="1.5" stroke-dasharray="10 30 50 20 80 40" />
    <circle class="rotating-ring" cx="660" cy="175" r="75" fill="none" stroke="#FF007F" stroke-width="1" stroke-dasharray="150 20 40 10" style="animation-direction: reverse; animation-duration: 12s;" />
    <circle class="rotating-ring" cx="660" cy="175" r="60" fill="none" stroke="#00F5FF" stroke-width="2" stroke-dasharray="5 5 10 5 20 10" />
    <!-- Glowing Core -->
    <circle cx="660" cy="175" r="25" fill="#0E0D22" stroke="#FF007F" stroke-width="2" filter="url(#magentaGlow)" />
    <polygon points="660,163 670,181 650,181" fill="#00F5FF" class="rotating-ring" style="animation-duration: 8s;" />
  </g>

  <!-- Brand Name Focus Area -->
  <g transform="translate(80, 0)">
    
    <!-- Cyber Badge Line -->
    <path d="M 0,95 L 20,95 L 30,105 L 180,105" fill="none" stroke="#FF007F" stroke-width="2" />
    <text class="font-mono" x="35" y="100" fill="#FF007F" font-size="10" letter-spacing="3">SYSTEM ARCHITECT</text>
    
    <!-- Main Glowing Title: VarshuAi -->
    <!-- Magenta Shadow Layer -->
    <text class="font-header glow-magenta glitch-text" x="0" y="175" fill="#FF007F" font-size="64" letter-spacing="4" opacity="0.9">VarshuAi</text>
    <!-- Cyan Glowing Layer -->
    <text class="font-header glow-cyan glitch-text" x="-3" y="172" fill="#00F5FF" font-size="64" letter-spacing="4" filter="url(#cyanGlow)">VarshuAi</text>
    <!-- Crisp White Foreground layer -->
    <text class="font-header glitch-text" x="-1" y="173" fill="#FFFFFF" font-size="64" letter-spacing="4">VarshuAi</text>

    <!-- Interactive Subtitle: Typing Simulator -->
    <g transform="translate(0, 215)">
      <!-- Transparent base text to allocate dimensions -->
      <text class="font-mono" x="0" y="0" fill="#A0A0B0" font-size="16" letter-spacing="2" opacity="0.3">
        &gt; Initializing systems validation...
      </text>

      <!-- Masked Typing Layer -->
      <clipPath id="typingClip">
        <rect class="typing-mask" x="0" y="-20" width="0" height="30" />
      </clipPath>

      <g clip-path="url(#typingClip)">
        <text class="font-mono" x="0" y="0" fill="#00F5FF" font-size="16" letter-spacing="2" filter="url(#cyanGlow)">
          &gt; High-Performance DevSecOps Suite Active
        </text>
      </g>
    </g>

    <!-- Mini Status Indicators (System Stats Look) -->
    <g transform="translate(0, 260)" class="font-mono" font-size="11" letter-spacing="1">
      <!-- Status Box 1 -->
      <rect x="0" y="0" width="105" height="24" fill="rgba(0, 245, 255, 0.05)" stroke="rgba(0, 245, 255, 0.2)" stroke-width="1" rx="4" />
      <circle cx="12" cy="12" r="3" fill="#39FF14" filter="url(#cyanGlow)" />
      <text x="24" y="16" fill="#00F5FF">STATUS: ONLINE</text>

      <!-- Status Box 2 -->
      <rect x="120" y="0" width="105" height="24" fill="rgba(255, 0, 127, 0.05)" stroke="rgba(255, 0, 127, 0.2)" stroke-width="1" rx="4" />
      <circle cx="132" cy="12" r="3" fill="#FF007F" />
      <text x="144" y="16" fill="#FF007F">PORTFOLIO: 650</text>

      <!-- Status Box 3 -->
      <rect x="240" y="0" width="105" height="24" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" rx="4" />
      <rect x="248" y="10" width="4" height="4" fill="#A0A0B0" />
      <text x="260" y="16" fill="#A0A0B0">CODENAME: NEON</text>
    </g>
  </g>

  <!-- Futuristic Border Borders -->
  <!-- Top-Left -->
  <path d="M 15,10 L 40,10 M 15,10 L 15,35" fill="none" stroke="#00F5FF" stroke-width="2" />
  <!-- Bottom-Left -->
  <path d="M 15,340 L 40,340 M 15,340 L 15,315" fill="none" stroke="#FF007F" stroke-width="2" />
  <!-- Top-Right -->
  <path d="M 785,10 L 760,10 M 785,10 L 785,35" fill="none" stroke="#FF007F" stroke-width="2" />
  <!-- Bottom-Right -->
  <path d="M 785,340 L 760,340 M 785,340 L 785,315" fill="none" stroke="#00F5FF" stroke-width="2" />

  <!-- Bottom Accent Panel Line -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <circle cx="400" cy="340" r="2" fill="#FF007F" />
</svg>
