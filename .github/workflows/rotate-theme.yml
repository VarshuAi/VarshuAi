name: 🎨 Daily Theme Rotation — All Repos

# on:
#   schedule:
#     # Every day at 00:05 IST (18:35 UTC)
#     - cron: '35 18 * * *'
#   workflow_dispatch: # Run manually from Actions tab anytime

jobs:
  rotate-theme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate today's theme (profile README + SVGs)
        run: python scripts/generate_readme.py

      - name: Commit profile README changes
        run: |
          git config user.email "action@github.com"
          git config user.name "VarshuOS Bot"
          git add README.md assets/
          git diff --staged --quiet || git commit -m "theme: $(TZ='Asia/Kolkata' date '+%A') rotation on profile"
          git push

      - name: Rotate theme across ALL other repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/rotate_all_repos.py
